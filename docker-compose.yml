version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: digelegram
      POSTGRES_PASSWORD: nNcIm0DD52rH28RXyo
      POSTGRES_DB: telegram_digest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digelegram"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://digelegram:nNcIm0DD52rH28RXyo@postgres:5432/telegram_digest
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - WORKER_URL=http://worker:3001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://digelegram:nNcIm0DD52rH28RXyo@postgres:5432/telegram_digest
      - BOT_TOKEN=${BOT_TOKEN}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - PHONE_NUMBER=${PHONE_NUMBER}
      - SESSION_STRING=${SESSION_STRING}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - NEXTJS_URL=http://nextjs:3000
      - WORKER_PORT=3001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
